# nowel19.github.io
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Project</title>

<style>
:root{
--c1:#e6ecf5;
--c2:#c2d1e6;
--c3:#9fb6d6;
--c4:#5f87b8;
--c5:#2f5d9f;
--c6:#1f3f6b;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:var(--c2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{
background:var(--c1);
padding:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
width:340px;
}

.title{
text-align:center;
margin-bottom:15px;
font-weight:bold;
color:var(--c6);
letter-spacing:1px;
}

.display{
width:100%;
height:60px;
font-size:24px;
text-align:right;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:15px;
background:var(--c3);
color:var(--c6);
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:var(--c2);
color:var(--c6);
transition:0.2s;
}

button:hover{
background:var(--c3);
}

.operator{
background:var(--c4);
color:white;
}

.operator:hover{
background:var(--c5);
}

.equal{
grid-column:span 2;
background:var(--c5);
color:white;
}

.equal:hover{
background:var(--c6);
}

.clear{
background:var(--c4);
color:white;
}

.clear:hover{
background:var(--c5);
}

.share-btn{
margin-top:15px;
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:var(--c5);
color:white;
font-size:15px;
cursor:pointer;
}

.share-btn:hover{
background:var(--c6);
}
</style>
</head>

<body>

<div class="calculator">
<div class="title">CALCULATOR</div>

<input id="display" class="display" readonly>

<div class="buttons">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button class="operator" onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button class="operator" onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button class="operator" onclick="add('-')">−</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="add('+')">+</button>

<button class="equal" onclick="calculate()">=</button>
</div>

<button class="share-btn" onclick="shareLink()">Copy Shareable Link</button>

</div>

<script>
const display=document.getElementById("display");

function add(v){
display.value+=v;
}

function clearDisplay(){
display.value="";
}

function calculate(){
try{
display.value=Function("return "+display.value)();
}catch{
alert("Invalid expression");
display.value="";
}
}

function shareLink(){
const url=window.location.href;

if(navigator.share){
navigator.share({title:"Calculator",url:url});
}else{
navigator.clipboard.writeText(url);
alert("Link copied!");
}
}
</script>

</body>
</html>
